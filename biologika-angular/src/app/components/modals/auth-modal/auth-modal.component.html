<div class="modal-overlay" (click)="onOverlayClick()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Benvenuto in Biologika</h2>
      <button class="close-modal" (click)="close.emit()">×</button>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn" [class.active]="activeTab === 'login'" (click)="activeTab = 'login'">Accedi</button>
      <button class="tab-btn" [class.active]="activeTab === 'register'" (click)="activeTab = 'register'">Registrati</button>
    </div>

    <!-- Login Tab -->
    @if (activeTab === 'login') {
      <div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="loginEmail" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="loginPassword" required>
        </div>
        <button class="btn btn-primary btn-full" (click)="onLogin()">Accedi al tuo account</button>
      </div>
    }

    <!-- Register Tab -->
    @if (activeTab === 'register') {
      <div>
        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" [(ngModel)]="regName" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="regEmail" required>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" [(ngModel)]="regPassword" required minlength="6">
        </div>
        <div class="form-group">
          <label>Telefono *</label>
          <input type="tel" [(ngModel)]="regPhone" required>
        </div>
        <div class="form-group">
          <label>Indirizzo di spedizione *</label>
          <input type="text" [(ngModel)]="regAddress" required placeholder="Via, numero civico">
        </div>
        <div class="form-group">
          <label>Città *</label>
          <input type="text" [(ngModel)]="regCity" required>
        </div>
        <div class="form-group">
          <label>CAP *</label>
          <input type="text" [(ngModel)]="regZip" required pattern="[0-9]{5}">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="regMarketing" [(ngModel)]="regMarketing">
          <label for="regMarketing">
            <strong>Voglio ricevere</strong> offerte esclusive, cataloghi e novità sui prodotti biologici
          </label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="regTerms" [(ngModel)]="regTerms" required>
          <label for="regTerms">
            Accetto i <strong>termini e condizioni</strong> e la privacy policy *
          </label>
        </div>

        <button class="btn btn-primary btn-full" (click)="onRegister()">Crea Account</button>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--brand); font-weight: 700; font-size: 1.1rem;">
          🎁 Ricevi subito il 5% di sconto sul primo ordine!
        </p>
      </div>
    }
  </div>
</div>
